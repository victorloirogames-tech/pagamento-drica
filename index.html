<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Final GPay</title>
    <script src="https://pay.google.com/gp/p/js/pay.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #e0f7fa; /* Cor azul clara para confirmar o update */
        }
        #container { width: 100%; max-width: 280px; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script>
        // MODO TESTE PURO
        const paymentsClient = new google.payments.api.PaymentsClient({ environment: 'TEST' });

        const button = paymentsClient.createButton({
            buttonColor: 'black', 
            buttonType: 'pay', 
            buttonSizeMode: 'fill',
            onClick: () => {
                const request = {
                    apiVersion: 2,
                    apiVersionMinor: 0,
                    allowedPaymentMethods: [{
                        type: 'CARD',
                        parameters: {
                            allowedAuthMethods: ["PAN_ONLY", "CRYPTOGRAM_3DS"],
                            allowedCardNetworks: ["MASTERCARD", "VISA"]
                        },
                        tokenizationSpecification: {
                            // TESTE SEM GATEWAY (Usa o padrão do Google para desenvolvedores)
                            type: 'DIRECT',
                            parameters: {
                                'protocolVersion': 'ECv2',
                                'publicKey': 'BOdo7sR1oX7NrYv50KAnS68A7oVs0S8tWtmG/a04yJ/Z7T695F066E1LqLw38qf70/u55CAd8e1D+6w4xGj0u2M='
                            }
                        }
                    }],
                    merchantInfo: {
                        merchantName: 'Teste de Integracao',
                        merchantId: '12345678901234567890' 
                    },
                    transactionInfo: {
                        totalPriceStatus: 'FINAL',
                        totalPrice: '1.00',
                        currencyCode: 'BRL',
                        countryCode: 'BR'
                    }
                };

                paymentsClient.loadPaymentData(request)
                    .then(paymentData => {
                        alert("VITÓRIA! A janela abriu. O problema é apenas a espera pela aprovação do Mercado Pago/Google.");
                    })
                    .catch(err => {
                        alert("Erro técnico: " + err.statusCode);
                    });
            }
        });

        document.getElementById('container').appendChild(button);
    </script>
</body>
</html>
