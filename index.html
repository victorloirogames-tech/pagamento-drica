<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Google Pay Teste - Drica Confeitaria</title>

<script src="https://pay.google.com/gp/p/js/pay.js"></script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:transparent;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
}

#container{
width:100%;
max-width:280px;
}
</style>
</head>

<body>

<div id="container"></div>

<script>
// ======================================
// GOOGLE PAY EM MODO TESTE
// ======================================

const paymentsClient =
new google.payments.api.PaymentsClient({
environment:"TEST"
});

// pega valor da URL ?total=10.00
const params = new URLSearchParams(window.location.search);

const total =
params.get("total") || "10.00";

// ======================================
// BOTÃO GOOGLE PAY
// ======================================

const button =
paymentsClient.createButton({
buttonColor:"black",
buttonType:"pay",
buttonSizeMode:"fill",

onClick: async () => {

try {

const paymentRequest = {

apiVersion:2,
apiVersionMinor:0,

allowedPaymentMethods:[
{
type:"CARD",

parameters:{
allowedAuthMethods:[
"PAN_ONLY",
"CRYPTOGRAM_3DS"
],

allowedCardNetworks:[
"VISA",
"MASTERCARD"
]
},

tokenizationSpecification:{
type:"PAYMENT_GATEWAY",

parameters:{
gateway:"mercadopago",
gatewayMerchantId:"APP_USR-809af91a-a817-4ecc-8d2a-2352e2528619"
}
}
}
],

merchantInfo:{
merchantName:"Drica Confeitaria"
},

transactionInfo:{
totalPriceStatus:"FINAL",
totalPrice:total,
currencyCode:"BRL",
countryCode:"BR"
}
};

// abre Google Pay
const paymentData =
await paymentsClient.loadPaymentData(paymentRequest);

// token gerado
const tokenObj =
JSON.parse(
paymentData.paymentMethodData
.tokenizationData.token
);

const token = tokenObj.id;

// envia para backend
const response =
await fetch(
"https://drica-backendd.vercel.app/api/criar-pagamento",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
method:"gpay",
token:token,
amount:total
})
}
);

const data = await response.json();

console.log(data);

// retorno
if(
data.status === "approved" ||
data.status === "in_process"
){

window.parent.postMessage(
{
type:"PAGAMENTO_OK",
paymentId:data.id
},
"*"
);

}else{

alert("Pagamento não aprovado.");

}

}catch(error){

console.error(error);

alert("Erro no Google Pay Teste.");

}

}
});

// renderiza botão
document
.getElementById("container")
.appendChild(button);
</script>

</body>
</html>
