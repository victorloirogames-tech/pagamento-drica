<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar Print Google Pay</title>
    <script src="https://pay.google.com/gp/p/js/pay.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #ffffff; }
        #container { width: 100%; max-width: 280px; }
    </style>
</head>
<body>
    <div id="container"></div>
    <script>
        // Usamos MODO TESTE e DIRECT para a janela abrir sem depender da aprovação do Mercado Pago
        const paymentsClient = new google.payments.api.PaymentsClient({ environment: 'TEST' });

        const button = paymentsClient.createButton({
            buttonColor: 'black', buttonType: 'pay', buttonSizeMode: 'fill',
            onClick: () => {
                const request = {
                    apiVersion: 2, apiVersionMinor: 0,
                    allowedPaymentMethods: [{
                        type: 'CARD',
                        parameters: { allowedAuthMethods: ["PAN_ONLY", "CRYPTOGRAM_3DS"], allowedCardNetworks: ["MASTERCARD", "VISA"] },
                        tokenizationSpecification: {
                            type: 'DIRECT',
                            parameters: {
                                'protocolVersion': 'ECv2',
                                'publicKey': 'BOdo7sR1oX7NrYv50KAnS68A7oVs0S8tWtmG/a04yJ/Z7T695F066E1LqLw38qf70/u55CAd8e1D+6w4xGj0u2M='
                            }
                        }
                    }],
                    merchantInfo: { merchantName: 'Drica Confeitaria', merchantId: '12345678901234567890' },
                    transactionInfo: { totalPriceStatus: 'FINAL', totalPrice: '10.00', currencyCode: 'BRL', countryCode: 'BR' }
                };
                paymentsClient.loadPaymentData(request).catch(err => console.error(err));
            }
        });
        document.getElementById('container').appendChild(button);
    </script>
</body>
</html>
