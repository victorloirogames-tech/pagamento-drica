<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste GPay - Drica</title>
    <script src="https://pay.google.com/gp/p/js/pay.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #fdf6e3; /* Cor de fundo para combinar com a Drica */
        }
        #container { width: 100%; max-width: 280px; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script>
        // MUDADO PARA 'TEST' PARA PULAR A VALIDAÇÃO DO GOOGLE
        const paymentsClient = new google.payments.api.PaymentsClient({ environment: 'TEST' });

        const urlParams = new URLSearchParams(window.location.search);
        const valorTotal = urlParams.get('total') || '1.00';

        const button = paymentsClient.createButton({
            buttonColor: 'black', 
            buttonType: 'pay', 
            buttonSizeMode: 'fill',
            onClick: () => {
                const request = {
                    apiVersion: 2,
                    apiVersionMinor: 0,
                    allowedPaymentMethods: [{
                        type: 'CARD',
                        parameters: {
                            allowedAuthMethods: ["PAN_ONLY", "CRYPTOGRAM_3DS"],
                            allowedCardNetworks: ["MASTERCARD", "VISA"]
                        },
                        tokenizationSpecification: {
                            type: 'PAYMENT_GATEWAY',
                            parameters: {
                                'gateway': 'mercadopago',
                                'gatewayMerchantId': 'APP_USR-809af91a-a817-4ecc-8d2a-2352e2528619'
                            }
                        }
                    }],
                    // AQUI ESTÁ O TRUQUE: Usando um ID genérico para o teste funcionar
                    merchantInfo: {
                        merchantName: 'Drica Confeitaria (MODO TESTE)',
                        merchantId: '12345678901234567890' 
                    },
                    transactionInfo: {
                        totalPriceStatus: 'FINAL',
                        totalPrice: valorTotal,
                        currencyCode: 'BRL',
                        countryCode: 'BR'
                    }
                };

                paymentsClient.loadPaymentData(request)
                    .then(paymentData => {
                        console.log("Sucesso no Teste!", paymentData);
                        alert("BOA! A janela abriu. O código está funcionando perfeitamente.");
                    })
                    .catch(err => {
                        console.error("Erro no teste:", err);
                        alert("Erro: " + (err.statusMessage || "Verifique o console"));
                    });
            }
        });

        document.getElementById('container').appendChild(button);
    </script>
</body>
</html>
