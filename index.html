<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Pay - Drica Confeitaria</title>
    <script src="https://pay.google.com/gp/p/js/pay.js"></script>
    <style>
        /* CSS para deixar o visual estilo iFood */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent; /* Remove o fundo branco */
            overflow: hidden;
        }

        #container {
            width: 100%;
            max-width: 300px; /* Largura padrão do botão */
            display: flex;
            justify-content: center;
        }

        /* Faz o botão do Google Pay ocupar bem o espaço */
        button.gpay-button {
            width: 100% !important;
            min-width: 250px !important;
        }
    </style>
</head>
<body>
    
    <div id="container"></div>

    <script>
        const baseRequest = { apiVersion: 2, apiVersionMinor: 0 };
        const paymentsClient = new google.payments.api.PaymentsClient({ 
            environment: 'PRODUCTION' // Mude para 'TEST' se quiser apenas testar o fluxo
        });

        const urlParams = new URLSearchParams(window.location.search);
        const valorTotal = urlParams.get('total') || '10.00';

        const button = paymentsClient.createButton({
            buttonColor: 'black',
            buttonType: 'pay',
            buttonSizeMode: 'fill', // Faz o botão preencher o container
            onClick: () => {
                const paymentDataRequest = Object.assign({}, baseRequest);
                paymentDataRequest.allowedPaymentMethods = [{
                    type: 'CARD',
                    parameters: {
                        allowedAuthMethods: ["PAN_ONLY", "CRYPTOGRAM_3DS"],
                        allowedCardNetworks: ["MASTERCARD", "VISA"]
                    },
                    tokenizationSpecification: {
                        type: 'PAYMENT_GATEWAY',
                        parameters: {
                            'gateway': 'mercadopago',
                            'gatewayMerchantId': 'SUA_PUBLIC_KEY_AQUI' // <--- TROQUE PELA SUA CHAVE DO MERCADO PAGO
                        }
                    }
                }];
                paymentDataRequest.merchantInfo = { merchantName: 'Drica Confeitaria' };
                paymentDataRequest.transactionInfo = {
                    totalPriceStatus: 'FINAL',
                    totalPrice: valorTotal,
                    currencyCode: 'BRL',
                    countryCode: 'BR'
                };

                paymentsClient.loadPaymentData(paymentDataRequest)
                    .then(function(paymentData) {
                        // Avisa o app do Base44 que deu certo
                        window.parent.postMessage("PAGAMENTO_OK", "*");
                    })
                    .catch(function(err) {
                        console.error("Erro no pagamento:", err);
                    });
            }
        });

        document.getElementById('container').appendChild(button);
    </script>
</body>
</html>
