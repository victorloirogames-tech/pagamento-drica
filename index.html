<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pagamento GPay - Drica Confeitaria</title>

<script src="https://pay.google.com/gp/p/js/pay.js"></script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:transparent !important;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
}

#container{
width:100%;
max-width:280px;
}
</style>
</head>

<body>

<div id="container"></div>

<script>
// ======================================
// GOOGLE PAY PRODUÇÃO (ORIGINAL)
// ======================================

const paymentsClient =
new google.payments.api.PaymentsClient({
environment:"PRODUCTION"
});

// valor via URL ?total=10.00
const urlParams =
new URLSearchParams(window.location.search);

const valorTotal =
urlParams.get("total") || "10.00";

// ======================================
// BOTÃO GOOGLE PAY
// ======================================

const button =
paymentsClient.createButton({
buttonColor:"black",
buttonType:"pay",
buttonSizeMode:"fill",

onClick: async () => {

try {

const request = {
apiVersion:2,
apiVersionMinor:0,

allowedPaymentMethods:[
{
type:"CARD",

parameters:{
allowedAuthMethods:[
"PAN_ONLY",
"CRYPTOGRAM_3DS"
],

allowedCardNetworks:[
"MASTERCARD",
"VISA"
]
},

tokenizationSpecification:{
type:"PAYMENT_GATEWAY",

parameters:{
gateway:"mercadopago",
gatewayMerchantId:"APP_USR-809af91a-a817-4ecc-8d2a-2352e2528619"
}
}
}
],

merchantInfo:{
merchantName:"Drica Confeitaria",
merchantId:"BCR2DN4T3XN3H3ZC"
},

transactionInfo:{
totalPriceStatus:"FINAL",
totalPrice:valorTotal,
currencyCode:"BRL",
countryCode:"BR"
}
};

// abre Google Pay
const paymentData =
await paymentsClient.loadPaymentData(request);

// token gerado
const token =
JSON.parse(
paymentData.paymentMethodData
.tokenizationData.token
).id;

// envia backend
const response =
await fetch(
"https://drica-backendd.vercel.app/api/criar-pagamento",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
token:token,
amount:valorTotal,
method:"gpay"
})
}
);

const data =
await response.json();

if(data.status === "approved"){

window.parent.postMessage(
"PAGAMENTO_OK",
"*"
);

}else{

alert(
"O pagamento não foi aprovado pela operadora."
);

}

}catch(error){

console.log(
"Aguardando aprovação final do Google..."
);

}

}
});

document
.getElementById("container")
.appendChild(button);
</script>

</body>
</html>
