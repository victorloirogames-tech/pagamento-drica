<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPay Drica</title>
    <script src="https://pay.google.com/gp/p/js/pay.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: transparent !important; overflow: hidden;
        }
        #container { width: 100%; max-width: 280px; display: flex; justify-content: center; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script>
        const paymentsClient = new google.payments.api.PaymentsClient({ environment: 'PRODUCTION' });
        const urlParams = new URLSearchParams(window.location.search);
        const valorTotal = urlParams.get('total') || '10.00';

        const button = paymentsClient.createButton({
            buttonColor: 'black',
            buttonType: 'pay',
            buttonSizeMode: 'fill',
            onClick: () => {
                const paymentDataRequest = {
                    apiVersion: 2,
                    apiVersionMinor: 0,
                    allowedPaymentMethods: [{
                        type: 'CARD',
                        parameters: {
                            allowedAuthMethods: ["PAN_ONLY", "CRYPTOGRAM_3DS"],
                            allowedCardNetworks: ["MASTERCARD", "VISA"]
                        },
                        tokenizationSpecification: {
                            type: 'PAYMENT_GATEWAY',
                            parameters: {
                                'gateway': 'mercadopago',
                                'gatewayMerchantId': 'APP_USR-809af91a-a817-4ecc-8d2a-2352e2528619'
                            }
                        }
                    }],
                    merchantInfo: { 
                        merchantName: 'Drica Confeitaria',
                        merchantId: 'BCR2DN4T6W7X6Z7X' // ID opcional, mas ajuda na produção
                    },
                    transactionInfo: {
                        totalPriceStatus: 'FINAL',
                        totalPrice: valorTotal,
                        currencyCode: 'BRL',
                        countryCode: 'BR'
                    }
                };

                paymentsClient.loadPaymentData(paymentDataRequest)
                .then(function(paymentData) {
                    // Extrai o token do Google Pay para enviar ao Mercado Pago
                    const tokenData = JSON.parse(paymentData.paymentMethodData.tokenizationData.token);
                    
                    // ENVIA PARA SEU BACKEND NA VERCEL (Troque pela sua URL da Vercel se for diferente)
                    fetch('https://drica-backendd.vercel.app/api/criar-pagamento.js', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            token: tokenData.id,
                            amount: valorTotal,
                            method: 'gpay'
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        window.parent.postMessage("PAGAMENTO_OK", "*");
                    });
                })
                .catch(err => console.error("Erro GPay:", err));
            }
        });

        document.getElementById('container').appendChild(button);
    </script>
</body>
</html>
